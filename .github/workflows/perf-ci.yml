name: Performance (Lighthouse CI)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lhci-patient:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: patient-website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: patient-website/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-patient-website
          path: patient-website/.lighthouseci
